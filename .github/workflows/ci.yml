name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint/typecheck/test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Verify (generate + format + lint + typecheck + test)
        run: npm run ci:verify

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  trivy_fs:
    name: Security (Trivy FS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  docker_and_trivy_images:
    name: Docker build + Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (dev target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: dev
          load: true
          tags: local/acme-api:ci

      - name: Build Web image (dev target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: dev
          load: true
          tags: local/acme-web:ci

      - name: Trivy scan API image (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/acme-api:ci
          format: sarif
          output: trivy-image-api.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan Web image (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/acme-web:ci
          format: sarif
          output: trivy-image-web.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-api.sarif

      - name: Upload Web SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-web.sarif
