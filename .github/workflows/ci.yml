name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint/typecheck/test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Verify (generate + format + lint + typecheck + test)
        run: npm run ci:verify

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  trivy_fs:
    name: Security (Trivy FS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (SARIF, report-only)
        run: |
          docker pull aquasec/trivy:0.56.1
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            .

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  docker_and_trivy_images:
    name: Docker build + Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (dev target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: dev
          load: true
          tags: local/acme-api:ci

      - name: Build Web image (dev target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: dev
          load: true
          tags: local/acme-web:ci

      - name: Trivy scan API image (SARIF, report-only)
        run: |
          docker pull aquasec/trivy:0.56.1
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image \
            --format sarif \
            --output trivy-image-api.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            local/acme-api:ci

      - name: Trivy scan Web image (SARIF, report-only)
        run: |
          docker pull aquasec/trivy:0.56.1
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            image \
            --format sarif \
            --output trivy-image-web.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            local/acme-web:ci

      - name: Upload API SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-api.sarif
          category: trivy-image-api

      - name: Upload Web SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-web.sarif
          category: trivy-image-web